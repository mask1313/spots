  * { -webkit-tap-highlight-color: transparent; }

  .ticker-badge { background: #FF2244; color: #fff; height: 100%; display: flex; align-items: center; gap: 8px; padding: 0 18px; font-weight: 800; letter-spacing: .5px; box-shadow: 0 0 18px rgba(255,34,68,.55); z-index: 2; white-space: nowrap; font-family: 'Changa'; }
  .ticker-track { flex: 1; overflow: hidden; position: relative; height: 100%; display: flex; align-items: center; }
  .ticker-move { display: inline-flex; white-space: nowrap; will-change: transform; animation: marquee 60s linear infinite; }
  .ticker-move:hover { animation-play-state: paused; }
  .ticker-item { padding: 0 26px; font-weight: 700; color: #e8eaf0; position: relative; }
  .ticker-item::after { content:"●"; color:#FF2244; position:absolute; left: -4px; top: 50%; transform: translateY(-50%); font-size: 8px; }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  .live-dot { width: 8px; height: 8px; border-radius: 99px; background: #fff; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: .2; } }

  /* ===== NAV ===== */
  .navbtn { position: relative; transition: color .2s, background .2s; }
  .navbtn.active { color:#fff; background: #1A1C20; }
  .navbtn.active::after { content:""; position:absolute; bottom:-1px; inset-inline: 8px; height:3px; background:#FF2244; border-radius:99px; box-shadow:0 0 12px #FF2244; }

  /* ===== CARDS ===== */
  .lift { transition: transform .25s cubic-bezier(.2,.8,.2,1), border-color .25s, box-shadow .25s; }
  .lift:hover { transform: translateY(-5px); border-color: rgba(255,255,255,.28); box-shadow: 0 20px 40px -20px rgba(0,0,0,.9), 0 0 28px -10px rgba(255,193,7,.5); }

  .fade-up { animation: fadeUp .5s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform:none; } }

  .shimmer { background: linear-gradient(100deg,#121316 30%,#1c1f26 50%,#121316 70%); background-size:200% 100%; animation: sh 1.3s infinite; }
  @keyframes sh { to { background-position:-200% 0; } }

  /* player magazine card */
  .star-card { position: relative; overflow: hidden; border:1px solid rgba(255,255,255,.08); border-radius:16px; background: radial-gradient(120% 90% at 50% 0%, #23262e 0%, #101114 60%); aspect-ratio: 3/4; }
  .star-num { position:absolute; inset-inline-start:8px; bottom:-6px; font-family:'Changa'; font-weight:800; font-size:92px; line-height:1; color:rgba(255,255,255,.06); z-index:1; }
  .star-photo { position:absolute; inset:0; width:100%; height:82%; object-fit:contain; object-position:bottom center; z-index:2; filter: drop-shadow(0 18px 24px rgba(0,0,0,.7)); transition: transform .3s; }
  .star-card:hover .star-photo { transform: scale(1.06); }
  .star-photo.thumbstyle { height:70%; top:8%; object-fit:cover; border-radius:12px; }

  .modal { position: fixed; inset:0; z-index:1000; display:none; align-items:center; justify-content:center; background: rgba(3,4,6,.9); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }

  .tbtn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:14px; border-radius:12px; font-weight:800; color:#fff; cursor:pointer; text-decoration:none; border:1px solid rgba(255,255,255,.12); background: linear-gradient(135deg,#0057FF,#3f7bff 55%,#FF2244); box-shadow:0 0 22px rgba(0,87,255,.4); transition: transform .2s, box-shadow .2s; }
  .tbtn:hover { transform: translateY(-2px); box-shadow:0 0 34px rgba(255,34,68,.55); }

  .altbtn { display:inline-flex; align-items:center; gap:8px; padding:11px 20px; border-radius:10px; font-weight:800; font-size:13.5px; color:#ffe08a; cursor:pointer; border:1px solid rgba(255,193,7,.5); background: rgba(255,193,7,.1); transition: all .25s; }

/* ============ HELPERS ============ */
const el = id => document.getElementById(id);
function esc(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function getSite(key){ const d=DATA[key]; if(!d)return ''; const w=(d.links||[]).find(l=>l.cls==='icon-web'); return w?w.url:''; }
function domainOf(url){ try{ return new URL(url).hostname.replace(/^www\./,''); }catch{ return ''; } }
function tUrl(url){ return 'https://translate.google.com/translate?sl=auto&tl=ar&u='+encodeURIComponent(url); }
function isArabicKey(key){ return AR_KEYS.has(key); }
function fav(url){ const d=domainOf(url); return d?`https://icons.duckduckgo.com/ip3/${d}.ico`:''; }
function monogram(name){ return (name||'?').trim().charAt(0); }

async function fetchJSON(url){
  try{ const r=await fetch(url); if(r.ok) return await r.json(); }catch(e){}
  try{ const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url)); if(r.ok) return await r.json(); }catch(e){}
  return null;
}

function buildNav(){
  el('nav').innerHTML = PAGES.map(p=>`
    <button class="navbtn whitespace-nowrap px-4 py-2.5 rounded-xl font-changa font-bold text-sm text-white/60 flex items-center gap-2" data-page="${p.id}" data-testid="nav-${p.id}" onclick="showPage('${p.id}')">
      <i class="fa-solid ${p.icon}"></i><span>${p.ar}</span>
    </button>`).join('');
  el('pages').innerHTML = PAGES.map(p=>`<section id="page-${p.id}" class="page-sec" style="display:none" data-testid="page-${p.id}"></section>`).join('');
}
let currentPage='home';
function showPage(id){
  currentPage=id;
  document.querySelectorAll('.page-sec').forEach(s=>s.style.display='none');
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active', b.dataset.page===id));
  const sec=el('page-'+id); sec.style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
  if(id==='matches') loadMatches();
}

function openInfo(key, type){
  const d=DATA[key]; if(!d) return;
  const site=getSite(key); const ar=isArabicKey(key);

  // logo
  let logoHtml='';
  if(type==='club'){ const b=ASSETS.clubs[key]; logoHtml = b?`<img src="${b}" class="w-16 h-16 object-contain">`:`<div class="w-16 h-16 rounded-full bg-gradient-to-br from-elec to-live flex items-center justify-center font-changa text-2xl font-extrabold">${esc(monogram(d.name))}</div>`; }
  else if(type==='star'){ const p=ASSETS.players[key]; logoHtml = p?`<img src="${p}" class="w-16 h-16 object-cover rounded-full border border-white/20">`:`<div class="w-16 h-16 rounded-full bg-gradient-to-br from-gold to-live flex items-center justify-center text-2xl"><i class="fa-solid fa-star"></i></div>`; }
  else { logoHtml = site?`<img src="${fav(site)}" onerror="this.style.display='none'" class="w-14 h-14 rounded-lg bg-white/5 p-1.5">`:''; }
  el('info-logo').innerHTML = logoHtml;

  el('info-name').textContent = d.name;
  el('info-sub').textContent = d.sub || '';

  // translate button (non-arabic sources with a website)
  const tEl=el('info-translate');
  if(site && !ar){
    const label = type==='news' ? 'تصفح الصحيفة مترجمة بالكامل للعربية'
               : type==='club' ? 'تصفح موقع النادي مترجماً للعربية'
               : 'تصفح الموقع مترجماً للعربية';
    tEl.innerHTML = `<a class="tbtn" href="${tUrl(site)}" target="_blank" rel="noopener" data-testid="translate-btn"><i class="fa-solid fa-language"></i><span>${label}</span></a>`;
    tEl.style.display='block';
  } else if(site && ar){
    tEl.innerHTML = `<a class="tbtn" style="background:linear-gradient(135deg,#B38600,#FFC107)" href="${site}" target="_blank" rel="noopener" data-testid="visit-btn"><i class="fa-solid fa-globe"></i><span>زيارة الموقع الرسمي</span></a>`;
    tEl.style.display='block';
  } else { tEl.innerHTML=''; tEl.style.display='none'; }

  // links row
  el('info-links').innerHTML = (d.links||[]).map(l=>{
    const href = (l.cls==='icon-web' && !ar) ? tUrl(l.url) : l.url;
    return `<a href="${href}" target="_blank" rel="noopener" class="w-11 h-11 rounded-xl bg-white/5 border border-white/10 hover:border-white/30 hover:bg-white/10 transition flex items-center justify-center" title="${esc(l.label)}" data-testid="info-link">
      <span class="w-5 h-5 inline-flex items-center justify-center">${ICONS[l.cls]||'🔗'}</span></a>`;
  }).join('');

  el('info-modal').classList.add('open');
}

const LEAGUES=[
  {id:4826, ar:'دوري روشن السعودي'},
  {id:4328, ar:'الدوري الإنجليزي'},
  {id:4335, ar:'الدوري الإسباني'},
  {id:4332, ar:'الدوري الإيطالي'},
  {id:4331, ar:'الدوري الألماني'},
  {id:4480, ar:'دوري أبطال أوروبا'},
];
let matchesLoaded=false, matchesLoading=false;
function scoreBug(e, isResult){
  const hb=e.strHomeTeamBadge, ab=e.strAwayTeamBadge;
  const img=u=>u?`<img src="${u}" class="w-9 h-9 object-contain" alt="">`:`<div class="w-9 h-9 rounded-full bg-white/10"></div>`;
  const status = isResult ? `<span class="bg-white/10 text-white/70 text-[10px] font-bold px-2 py-1 rounded uppercase">${esc(e.strStatus||'FT')}</span>`
                          : `<span class="bg-live text-white text-[10px] font-bold px-2 py-1 rounded">${esc((e.dateEvent||'').slice(5))} ${esc((e.strTime||'').slice(0,5))}</span>`;
  const score = isResult ? `<div class="font-changa text-2xl font-extrabold px-4">${e.intHomeScore??'-'} <span class="text-white/30">:</span> ${e.intAwayScore??'-'}</div>`
                         : `<div class="font-changa text-lg text-white/40 px-4">VS</div>`;
  return `<div class="scorebug lift fade-up">
    <div class="flex items-center gap-2 p-3 flex-1 min-w-0"><span class="truncate text-sm font-bold">${esc(e.strHomeTeam)}</span>${img(hb)}</div>
    <div class="bg-black flex flex-col items-center justify-center px-2">${score}${status}</div>
    <div class="flex items-center gap-2 p-3 flex-1 min-w-0 flex-row-reverse">${img(ab)}<span class="truncate text-sm font-bold text-right w-full">${esc(e.strAwayTeam)}</span></div>
  </div>`;
}
async function loadMatches(){
  if(matchesLoaded || matchesLoading) return;
  matchesLoading=true;
  const cacheKey='uh_matches';
  const cached = (()=>{ try{ const c=JSON.parse(localStorage.getItem(cacheKey)||'null'); if(c && Date.now()-c.t < 1800000) return c.d; }catch{} return null; })();
  const sec=el('page-matches');
  if(cached){ renderMatches(cached.results, cached.fixtures); matchesLoaded=true; matchesLoading=false; return; }

  sec.innerHTML = sectionTitle('نتائج ومواعيد المباريات','مباشرة من الدوريات الكبرى')+
    `<div class="flex items-center gap-3 text-white/50 py-16 justify-center"><i class="fa-solid fa-futbol fa-spin text-2xl text-gold"></i> جاري تحميل المباريات...</div>`;

  const results=[], fixtures=[];
  for(const lg of LEAGUES){
    const past = await fetchJSON(`https://www.thesportsdb.com/api/v1/json/3/eventspastleague.php?id=${lg.id}`);
    (past&&past.events||[]).slice(0,2).forEach(e=>results.push(e));
    const next = await fetchJSON(`https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=${lg.id}`);
    (next&&next.events||[]).slice(0,2).forEach(e=>fixtures.push(e));
  }
  try{ localStorage.setItem(cacheKey, JSON.stringify({t:Date.now(), d:{results, fixtures}})); }catch{}
  renderMatches(results, fixtures);
  matchesLoaded=true; matchesLoading=false;
}
function renderMatches(results, fixtures){
  const sec=el('page-matches');
  const rHtml = results.length ? results.map(e=>scoreBug(e,true)).join('') : '<p class="text-white/40 text-sm">لا توجد نتائج متاحة حالياً.</p>';
  const fHtml = fixtures.length ? fixtures.map(e=>scoreBug(e,false)).join('') : '<p class="text-white/40 text-sm">لا توجد مواعيد متاحة حالياً.</p>';
  sec.innerHTML = sectionTitle('نتائج ومواعيد المباريات','مباشرة من الدوريات الكبرى')+
    `<h3 class="font-changa text-xl font-bold mb-3 flex items-center gap-2"><i class="fa-solid fa-flag-checkered text-gold"></i> أحدث النتائج</h3>
     <div class="grid grid-cols-1 lg:grid-cols-2 gap-3 mb-10">${rHtml}</div>
     <h3 class="font-changa text-xl font-bold mb-3 flex items-center gap-2"><i class="fa-regular fa-clock text-live"></i> المباريات القادمة</h3>
     <div class="grid grid-cols-1 lg:grid-cols-2 gap-3">${fHtml}</div>`;
}

/* ============ NEWS SLIDER + TICKER ============ */
let nsCur=0, nsTotal=0, nsTimer;
window.nsGoTo=function(i){ const track=el('ns-track'); const slides=track.children; if(!slides.length)return; nsCur=((i%nsTotal)+nsTotal)%nsTotal; const w=(slides[0].offsetWidth||260)+12; track.style.transform=`translateX(${nsCur*w}px)`; document.querySelectorAll('#ns-dots .dot').forEach((d,idx)=>d.classList.toggle('bg-live',idx===nsCur)); resetAuto(); };
window.nsPrev=()=>nsGoTo(nsCur-1); window.nsNext=()=>nsGoTo(nsCur+1);
function resetAuto(){ clearInterval(nsTimer); nsTimer=setInterval(()=>nsGoTo(nsCur+1),3500); }

const STATIC_NEWS=[
 {t:'الهلال يواصل تصدر دوري روشن في الموسم الجديد', s:'روشن', l:'https://news.google.com/search?q=%D8%A7%D9%84%D9%87%D9%84%D8%A7%D9%84&hl=ar', img:'https://images.unsplash.com/photo-1522778119026-d647f0596c20?w=800&q=80'},

 {t:'رونالدو يقود النصر لفوز جديد ويسجل هدفاً مميزاً', s:'روشن', l:'https://news.google.com/search?q=%D8%B1%D9%88%D9%86%D8%A7%D9%84%D8%AF%D9%88&hl=ar', img:'https://images.unsplash.com/photo-1517466787929-bc90951d0974?w=800&q=80'},
 {t:'برشلونة يواصل المنافسة على صدارة الليغا', s:'الليغا', l:'https://news.google.com/search?q=%D8%A8%D8%B1%D8%B4%D9%84%D9%88%D9%86%D8%A9&hl=ar', img:'https://images.unsplash.com/photo-1431324155629-1a6deb1dec8d?w=800&q=80'},
 {t:'ميسي ونجوم إنتر ميامي في مواجهات قوية', s:'MLS', l:'https://news.google.com/search?q=%D9%85%D9%8A%D8%B3%D9%8A&hl=ar', img:'https://images.unsplash.com/photo-1553778263-73a83bab9b0c?w=800&q=80'},

];

async function initNewsSlider(){
  const track=el('ns-track'), dots=el('ns-dots');
  let items=[];
  const feeds=[
    {rss:'https://arabic.sport360.com/feed', name:'سبورت 360'},
    {rss:'https://www.aljazeera.net/aljazeerarss/sports', name:'الجزيرة رياضة'},
    {rss:'https://e00-marca.uecdn.es/rss/futbol/primera-division.xml', name:'ماركا'},
  ];
  try{
    for(const f of feeds){
      const j=await fetchJSON(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(f.rss)}`);
      if(j && j.status==='ok' && j.items){ j.items.forEach(it=>{ const t=(it.title||'').trim(); if(t.length>8) items.push({t, s:f.name, l:it.link||'#', img:it.thumbnail||it.enclosure?.link||null}); }); }
      if(items.length>=10) break;
    }
  }catch(e){}
  items = items.filter((v,i,a)=>a.findIndex(x=>x.t===v.t)===i).slice(0,10);
  if(!items.length) items=STATIC_NEWS.slice();
  items = items.map((it,i)=>({...it, img: it.img || STATIC_NEWS[i%STATIC_NEWS.length].img}));

  nsTotal=items.length;
  track.innerHTML=items.map(it=>`
    <a href="${it.l}" target="_blank" rel="noopener" class="relative shrink-0 rounded-2xl overflow-hidden border border-white/10 group" style="width:260px;height:200px" data-testid="news-slide">
      <div class="absolute inset-0 bg-cover bg-center transition-transform duration-500 group-hover:scale-105" style="background-image:url('${it.img}')"></div>
      <div class="absolute inset-0" style="background:linear-gradient(to top,#0A0A0B 8%,rgba(10,10,11,.3) 60%,transparent)"></div>
      <div class="absolute inset-x-0 bottom-0 p-4 z-10">
        <span class="text-[10px] font-changa font-bold bg-live text-white rounded px-2 py-0.5">${esc(it.s)}</span>
        <div class="font-bold text-sm mt-2 leading-snug line-clamp-2">${esc(it.t)}</div>
      </div>
    </a>`).join('');
  dots.innerHTML=items.map((_,i)=>`<div class="dot w-2 h-2 rounded-full ${i===0?'bg-live':'bg-white/20'} cursor-pointer transition" onclick="nsGoTo(${i})"></div>`).join('');

  // touch
  let tx=0; const vp=el('ns-viewport');
  vp.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
  vp.addEventListener('touchend',e=>{ const d=tx-e.changedTouches[0].clientX; if(Math.abs(d)>40) d>0?nsNext():nsPrev(); },{passive:true});
  resetAuto();

  // TICKER
  const tickerItems = items.map(it=>`<span class="ticker-item">${esc(it.t)}</span>`).join('');
  el('ticker-move').innerHTML = tickerItems + tickerItems; // duplicate for seamless loop
}

/* ============ CLOCK + WEATHER ============ */
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0'), m=String(now.getMinutes()).padStart(2,'0');
  const days=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  el('tb-time').textContent=`${h}:${m}`;
  el('tb-date').textContent=`${days[now.getDay()]}، ${now.getDate()} ${months[now.getMonth()]}`;
}
const wIcons={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
async function loadWeather(){
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:6000}));
    const {latitude:lat,longitude:lon}=pos.coords;
    const w=await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`)).json();
    el('w-icon').textContent=wIcons[w.current_weather.weathercode]||'🌡️';
    el('w-deg').textContent=`${Math.round(w.current_weather.temperature)}°`;
    try{ const g=await (await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ar`)).json(); el('w-city').textContent=g.address?.city||g.address?.town||g.address?.state||'موقعك'; }catch{ el('w-city').textContent='موقعك'; }
  }catch(e){ el('w-icon').textContent='📍'; el('w-deg').textContent='--°'; el('w-city').textContent='الطقس'; }
}
