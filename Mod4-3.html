<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0A0A0B; }
  body { font-family: 'Tajawal', sans-serif; color: #fff; overflow-x: hidden; }
  h1,h2,h3,.font-changa { font-family: 'Changa', sans-serif; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #0A0A0B; }
  ::-webkit-scrollbar-thumb { background: #272A30; border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: #FF2244; }
  ::selection { background: #FF2244; color: #fff; }

  body::before {
    content:""; position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .04;
    background-image: repeating-linear-gradient(0deg, #fff 0, #fff 1px, transparent 1px, transparent 3px);
  }

  .glass { background: rgba(18,19,22,.72); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }

  .live-dot { width: 8px; height: 8px; border-radius: 99px; background: #fff; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: .2; } }

  .navbtn { position: relative; transition: color .2s, background .2s; }
  .navbtn.active { color:#fff; background: #1A1C20; }
  .navbtn.active::after { content:""; position:absolute; bottom:-1px; inset-inline: 8px; height:3px; background:#FF2244; border-radius:99px; box-shadow:0 0 12px #FF2244; }

  .lift { transition: transform .25s cubic-bezier(.2,.8,.2,1), border-color .25s, box-shadow .25s; }
  .lift:hover { transform: translateY(-5px); border-color: rgba(255,255,255,.28); box-shadow: 0 20px 40px -20px rgba(0,0,0,.9), 0 0 28px -10px rgba(255,193,7,.5); }

  .fade-up { animation: fadeUp .5s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform:none; } }

  .star-card { position: relative; overflow: hidden; border:1px solid rgba(255,255,255,.08); border-radius:16px; background: radial-gradient(120% 90% at 50% 0%, #23262e 0%, #101114 60%); aspect-ratio: 3/4; }
  .star-num { position:absolute; inset-inline-start:8px; bottom:-6px; font-family:'Changa'; font-weight:800; font-size:92px; line-height:1; color:rgba(255,255,255,.06); z-index:1; }
  .star-photo { position:absolute; inset:0; width:100%; height:82%; object-fit:contain; object-position:bottom center; z-index:2; filter: drop-shadow(0 18px 24px rgba(0,0,0,.7)); transition: transform .3s; }
  .star-card:hover .star-photo { transform: scale(1.06); }

  .modal { position: fixed; inset:0; z-index:1000; display:none; align-items:center; justify-content:center; background: rgba(3,4,6,.9); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
  .modal.open { display:flex; animation: fadeUp .2s ease; }

  .tbtn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:14px; border-radius:12px; font-weight:800; color:#fff; cursor:pointer; text-decoration:none; border:1px solid rgba(255,255,255,.12); background: linear-gradient(135deg,#0057FF,#3f7bff 55%,#FF2244); box-shadow:0 0 22px rgba(0,87,255,.4); transition: transform .2s, box-shadow .2s; }
  .tbtn:hover { transform: translateY(-2px); box-shadow:0 0 34px rgba(255,34,68,.55); }

  .altbtn { display:inline-flex; align-items:center; gap:8px; padding:11px 20px; border-radius:10px; font-weight:800; font-size:13.5px; color:#ffe08a; cursor:pointer; border:1px solid rgba(255,193,7,.5); background: rgba(255,193,7,.1); transition: all .25s; }
  .altbtn:hover { color:#0A0A0B; background:#FFC107; box-shadow:0 0 24px rgba(255,193,7,.5); transform: translateY(-2px); }
  .altbtn.on { color:#0A0A0B; background:#FF2244; border-color:#FF2244; box-shadow:0 0 24px rgba(255,34,68,.5); }

  .no-scrollbar::-webkit-scrollbar{ display:none; } .no-scrollbar{ scrollbar-width:none; }

  /* ===== MOBILE ===== */
  @media (max-width: 640px) {
    .star-num { font-size: 60px; }
    .star-photo { height: 75%; }
    #player-frame { min-height: 200px; }
    nav { gap: 2px !important; padding: 6px !important; }
    .navbtn { padding: 8px 10px !important; font-size: 11px !important; }
    .navbtn span { display: none; }
    .navbtn i { font-size: 16px; }
    header { padding-top: 12px !important; padding-bottom: 8px !important; }
  }
</style>
</head>

<!-- INFO POPUP -->
<div class="modal" id="info-modal" onclick="closeInfo(event)">

</div>

<!-- PLAYER POPUP -->
<div class="modal" id="player-modal" onclick="closePlayer(event)">

async function _fetchRSS(feedUrl){
  const proxies = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  ];
  for(const makeProxy of proxies){
    try{
      const r = await fetch(makeProxy(feedUrl), {signal: AbortSignal.timeout(8000)});
      if(!r.ok) continue;
      const text = await r.text();
      if(!text || text.length < 100) continue;
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, 'text/xml');
      const items = [...xml.querySelectorAll('item')].slice(0,8).map(it=>{
        const desc = it.querySelector('description')?.textContent||'';
        const imgMatch = desc.match(/<img[^>]+src=["']([^"']+)["']/i);
        return {
          title: it.querySelector('title')?.textContent?.trim()||'',
          description: desc.replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim(),
          link: it.querySelector('link')?.textContent?.trim()||'#',
          pubDate: it.querySelector('pubDate')?.textContent||'',
          thumbnail: imgMatch?imgMatch[1]:'',
        };
      }).filter(it=>it.title.length>5);
      if(items.length) return items;
    }catch(e){}
  }
  return [];
}

async function _fetchNewsFromClaude(){
  const results = await Promise.allSettled([
    fetch(`https://newsapi.org/v2/everything?q=دوري+روشن+OR+الهلال+OR+النصر&language=ar&sortBy=publishedAt&pageSize=10&apiKey=${NEWSAPI_KEY}`).then(r=>r.json()),
    fetch(`https://newsapi.org/v2/everything?q=premier+league+OR+laliga+OR+champions+league&language=ar&sortBy=publishedAt&pageSize=10&apiKey=${NEWSAPI_KEY}`).then(r=>r.json()),
    fetch(`https://newsapi.org/v2/everything?q=كرة+القدم+انتقالات&language=ar&sortBy=publishedAt&pageSize=8&apiKey=${NEWSAPI_KEY}`).then(r=>r.json()),
  ]);

  const catMap = ['saudi','euro','world'];
  const items = [];

  results.forEach((r,i)=>{
    if(r.status!=='fulfilled') return;
    const d = r.value;
    if(d.status!=='ok' || !d.articles) return;
    d.articles.forEach(a=>{
      if(!a.title || a.title==='[Removed]') return;
      items.push({
        title: a.title,
        desc: (a.description||'').slice(0,180),
        link: a.url||'#',
        img: a.urlToImage||'',
        date: a.publishedAt||'',
        source: a.source?.name||'',
        flag: i===0?'🇸🇦':i===1?'🌍':'💰',
        lang: 'ar',
        cat: catMap[i],
        titleAr: a.title,
        descAr: (a.description||'').slice(0,180),
      });
    });
  });

  return items.sort((a,b)=>new Date(b.date)-new Date(a.date));
}


function _timeAgo(dateStr){
  if(!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const m=Math.floor(diff/60000), h=Math.floor(m/60), d=Math.floor(h/24);
  if(d>0) return `منذ ${d} ${d===1?'يوم':'أيام'}`;
  if(h>0) return `منذ ${h} ${h===1?'ساعة':'ساعات'}`;
  if(m>0) return `منذ ${m} ${m===1?'دقيقة':'دقائق'}`;
  return 'الآن';
}

async function fetchJSON(url){
  try{ const r=await fetch(url); if(r.ok) return await r.json(); }catch(e){}
  try{ const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url)); if(r.ok) return await r.json(); }catch(e){}
  return null;
}

/* ============ NEWS SLIDER ============ */
let nsCur=0, nsTotal=0, nsTimer;
window.nsGoTo=function(i){ const track=el('ns-track'); const slides=track.children; if(!slides.length)return; nsCur=((i%nsTotal)+nsTotal)%nsTotal; const w=(slides[0].offsetWidth||260)+12; track.style.transform=`translateX(${nsCur*w}px)`; document.querySelectorAll('#ns-dots .dot').forEach((d,idx)=>d.classList.toggle('bg-live',idx===nsCur)); resetAuto(); };
window.nsPrev=()=>nsGoTo(nsCur-1); window.nsNext=()=>nsGoTo(nsCur+1);
function resetAuto(){ clearInterval(nsTimer); nsTimer=setInterval(()=>nsGoTo(nsCur+1),3500); }

];

async function initNewsSlider(){
  const track=el('ns-track'), dots=el('ns-dots');
  let items=[];
  try{
    const feeds=[
      {rss:'https://news.google.com/rss/search?q='+encodeURIComponent('كرة القدم')+'&hl=ar&gl=SA&ceid=SA:ar',name:'أخبار عربية'},
      {rss:'https://feeds.bbci.co.uk/sport/football/rss.xml',name:'BBC Football'},
      {rss:'https://e00-marca.uecdn.es/rss/futbol/primera-division.xml',name:'ماركا'},
    ];
    for(const f of feeds){
      const j=await fetchJSON(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(f.rss)}`);
      if(j&&j.status==='ok'&&j.items) j.items.forEach(it=>{
        let t=(it.title||'').trim(); let s=f.name;
        if(f.name==='أخبار عربية'&&t.includes(' - ')){ const p=t.split(' - '); s=p.pop().trim(); t=p.join(' - ').trim(); }
        if(t.length>8) items.push({t,s,l:it.link||'#',img:it.thumbnail||it.enclosure?.link||null,d:Date.parse(it.pubDate||'')||0});
      });
    }
  }catch(e){}
  items=items.filter((v,i,a)=>a.findIndex(x=>x.t===v.t)===i).sort((a,b)=>b.d-a.d).slice(0,14);
  if(!items.length) items=STATIC_NEWS.slice();
  items=items.map((it,i)=>({...it,img:it.img||STATIC_NEWS[i%STATIC_NEWS.length].img}));
  nsTotal=items.length;
  track.innerHTML=items.map(it=>`
    <a href="${it.l}" target="_blank" rel="noopener" class="relative shrink-0 rounded-2xl overflow-hidden border border-white/10 group" style="width:260px;height:200px">
      <div class="absolute inset-0 bg-cover bg-center transition-transform duration-500 group-hover:scale-105" style="background-image:url('${it.img}')"></div>
      <div class="absolute inset-0" style="background:linear-gradient(to top,#0A0A0B 8%,rgba(10,10,11,.3) 60%,transparent)"></div>
      <div class="absolute inset-x-0 bottom-0 p-4 z-10">
        <span class="text-[10px] font-changa font-bold bg-live text-white rounded px-2 py-0.5">${esc(it.s)}</span>
        <div class="font-bold text-sm mt-2 leading-snug line-clamp-2">${esc(it.t)}</div>
      </div>
    </a>`).join('');
  dots.innerHTML=items.map((_,i)=>`<div class="dot w-2 h-2 rounded-full ${i===0?'bg-live':'bg-white/20'} cursor-pointer transition" onclick="nsGoTo(${i})"></div>`).join('');
  let tx=0; const vp=el('ns-viewport');
  vp.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
  vp.addEventListener('touchend',e=>{ const d=tx-e.changedTouches[0].clientX; if(Math.abs(d)>40) d>0?nsNext():nsPrev(); },{passive:true});
  resetAuto();
}

function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0'), m=String(now.getMinutes()).padStart(2,'0');
  const days=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  el('tb-time').textContent=`${h}:${m}`;
  el('tb-date').textContent=`${days[now.getDay()]}، ${now.getDate()} ${months[now.getMonth()]}`;
}
